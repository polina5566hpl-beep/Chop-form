<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 طلب شراء</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background-color: #f4f4f4; }
        .form-container { width: 100%; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        form { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #222; font-size: 26px; margin-bottom: 25px; }
        input, select { width: 100%; margin-bottom: 15px; padding: 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; text-align: right; background-color: #f9f9f9; }
        button { width: 100%; padding: 18px; background-color: darkgreen; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="form-container">
    <h1>🛒 طلب شراء</h1>
    <form id="orderForm">
        <input type="text" id="name" name="name" placeholder="الإسم الكامل" required>
        <input type="tel" id="phone" name="phone" placeholder="رقم الهاتف (05/06/07)" required>

        <select id="wilaya" name="wilaya" onchange="updateCommune()" required>
            <option value="">الولاية</option>
            <option value="الجزائر">16 - الجزائر</option>
            <option value="سيدي بلعباس">22 - سيدي بلعباس</option>
            <option value="تلمسان">13 - تلمسان</option>
        </select>

        <select id="commune" name="commune" required>
            <option value="">البلدية</option>
        </select>

        <select id="quantity" name="quantity" required>
            <option value="">الكمية</option>
            <option value="1 séré de 6 pieces">1 séré de 6 pieces</option>
            <option value="1 séré de 8 pieces">1 séré de 8 pieces</option>
            <option value="1 séré de 12 pieces">1 séré de 12 pieces</option>
        </select>

        <select id="delivery" name="delivery" required>
            <option value="">مكان التوصيل</option>
            <option value="إلى منزل">🏠 إلى منزل</option>
            <option value="إلى مكتب شركة التوصيل">🏬 إلى مكتب شركة التوصيل</option>
        </select>

        <button type="submit" id="submitBtn">إرسال الطلب</button>
    </form>
</div>

<script>
// تحديث قائمة البلديات
function updateCommune() {
    let wilaya = document.getElementById("wilaya").value;
    let commune = document.getElementById("commune");
    commune.innerHTML = '<option value="">البلدية</option>';

    let data = {
        "الجزائر": ["باب الزوار", "حيدرة", "بئر مراد رايس"],
        "سيدي بلعباس": ["سيدي بلعباس", "تلاغ", "راس الماء"],
        "تلمسان": ["تلمسان", "مغنية", "الغزوات"]
    };

    if (data[wilaya]) {
        data[wilaya].forEach(name => {
            let opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            commune.appendChild(opt);
        });
    }
}

// إرسال البيانات
const form = document.getElementById('orderForm');
const btn = document.getElementById('submitBtn');

form.addEventListener('submit', e => {
    e.preventDefault();
    
    // التحقق من رقم الهاتف الجزائري
    let phone = document.getElementById("phone").value;
    if(!/^(05|06|07)[0-9]{8}$/.test(phone)){
        showMessage("رقم الهاتف غير صحيح ❌", "red");
        return;
    }

    btn.disabled = true;
    btn.textContent = "جاري الإرسال...";

    // رابط الـ Web App الخاص بك (ضعه هنا)
    const scriptURL = 'ضع_هنا_الرابط_الذي_نسخته_من_جوجل';

    fetch(scriptURL, { 
        method: 'POST', 
        body: new FormData(form),
        mode: 'no-cors' 
    })
    .then(() => {
        showMessage("تم إرسال طلبك بنجاح ✔", "green");
        btn.textContent = "تم الإرسال ✔";
        form.reset();
        document.getElementById("commune").innerHTML = '<option value="">البلدية</option>';
        setTimeout(() => {
            btn.disabled = false;
            btn.textContent = "إرسال الطلب";
        }, 3000);
    })
    .catch(error => {
        showMessage("حدث خطأ، حاول مرة أخرى ❌", "red");
        btn.disabled = false;
        btn.textContent = "إرسال الطلب";
    });
});

function showMessage(msg, color){
    let div = document.createElement("div");
    div.textContent = msg;
    div.style.cssText = `position:fixed; bottom:20px; right:20px; background:${color}; color:white; padding:15px 20px; border-radius:10px; z-index:9999; direction:rtl;`;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 4000);
}
</script>

</body>
</html>
