<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معرض المنتجات - صور مصغرة</title>


<link rel="stylesheet" href="panier.css">


<link rel="stylesheet" href="button.css">


<link rel="stylesheet" href="lightbox.css">


<link rel="stylesheet" href="order.css">

<!-- ربط Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Tajawal', sans-serif;
        background: #fdf8f2;  /* لون خلفية الـ navbar */
        padding-top: 85px;
    }
    
    /* ===== navbar ثابت مع شعار في المنتصف ===== */
    .s-nav {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 40;
        background: rgba(253, 248, 242, 0.92);
        backdrop-filter: blur(0px) saturate(1.6);
        border-bottom: 2px solid rgba(180, 130, 80, 0.3);
        padding: 0.7rem 1rem;
        box-shadow: 0 2px 16px rgba(180, 100, 40, 0.06);
        border-radius: 0 0 20px 20px;
    }
    
    .nav-wrap {
        max-width: 1300px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
    }
    
    .s-brand {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.55rem;
        font-family: 'Cairo', sans-serif;
        font-size: 1.75rem;
        font-weight: 900;
        background: linear-gradient(135deg, #e9a84c 0%, #c97d3a 45%, #c25e3a 80%, #9e3a3a 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        white-space: nowrap;
    }
    
    .s-brand svg {
        -webkit-text-fill-color: initial;
        flex-shrink: 0;
    }
    
    /* ===== نهاية navbar ===== */
    
    .gallery {
        max-width: 1700px;
        margin: 0 auto;
    }
    
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
    }
    
    .card {
        background: #ffffff;
        border-radius: 28px;
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        box-shadow: 0 4px 20px rgba(180, 100, 40, 0.08);
        border: 1px solid rgba(180, 130, 80, 0.15);
    }
    
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 32px rgba(201, 125, 58, 0.15);
        border-color: rgba(201, 125, 58, 0.3);
    }
    
    /* الصورة الرئيسية */
    .main-image-container {
        width: 100%;
        background: #faf3e8;  /* لون bg-1 من الـ navbar */
    }
    
    .main-image-container img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        display: block;
        transition: opacity 0.2s ease;
    }
    
    /* مصفوفة الصور المصغرة */
    .thumbnails {
        display: flex;
        gap: 0.5rem;
        padding: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
        background: #f5ead8;  /* لون bg-2 من الـ navbar */
        border-top: 1px solid rgba(180, 130, 80, 0.15);
    }
    
    .thumbnail {
        width: 60px;
        height: 60px;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        border: 2px solid transparent;
        transition: all 0.2s ease;
        background: #fff;
    }
    
    .thumbnail img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    
    .thumbnail.active {
        border-color: #c97d3a;  /* لون caramel */
        transform: scale(0.95);
        box-shadow: 0 2px 12px rgba(201, 125, 58, 0.3);
    }
    
    .thumbnail:hover:not(.active) {
        border-color: #d4a96a;  /* لون sand */
        transform: scale(0.98);
    }
    
    .card-info {
        padding: 0.75rem 1rem 1rem 1rem;
        text-align: center;
        background: #ffffff;
    }
    
    .card-info h3 {
        margin-bottom: 0.25rem;
        color: #2d1f0e;  /* لون text-hi */
        font-size: 1.2rem;
        font-weight: 700;
        font-family: 'Cairo', sans-serif;
    }
    
    /* ===== تنسيق السعر الجديد (تم إزالة الخلفية البنية) ===== */
    .product-price {
        margin-top: 0.5rem;
        font-size: 1.2rem;
        font-weight: 800;
        color: #c97d3a;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.3rem;
        font-family: 'Cairo', sans-serif;
    }
    
    .product-price .currency {
        font-size: 0.9rem;
        font-weight: 600;
        color: #9e3a3a;
        /* تم إزالة background, padding, border-radius بالكامل */
    }
    
    /* إضافة ألوان تحسينية للـ body */
    .gallery-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .gallery-header h1 {
        font-family: 'Cairo', sans-serif;
        font-size: clamp(1.8rem, 4vw, 2.5rem);
        font-weight: 900;
        background: linear-gradient(135deg, #e9a84c 0%, #c97d3a 45%, #c25e3a 80%, #9e3a3a 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.5rem;
    }
    
    @media (max-width: 640px) {
        .s-brand {
            font-size: 1.15rem;
            gap: 0.35rem;
        }
        .s-brand svg {
            width: 26px;
            height: 26px;
        }
        body {
            padding-top: 70px;
        }
        .grid {
            gap: 1rem;
        }
        .thumbnail {
            width: 50px;
            height: 50px;
        }
        .thumbnails {
            gap: 0.4rem;
            padding: 0.5rem;
        }
        .product-price {
            font-size: 1rem;
        }
        .product-price .currency {
            font-size: 0.75rem;
        }
    }
    
</style>

</head>
<body>

<!-- navbar ثابت مع شعار في المنتصف -->
<nav class="s-nav">
    <div class="nav-wrap">
      
      <button class="menu-btn" id="menuBtn">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M3 12H21" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M3 6H21" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M3 18H21" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>
      
        <div class="s-brand">
            <svg width="34" height="34" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="pawN" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#e9a84c"/>
                        <stop offset="100%" stop-color="#c25e3a"/>
                    </linearGradient>
                </defs>
                <ellipse cx="28" cy="40" rx="7" ry="10" fill="url(#pawN)" transform="rotate(-15 28 40)"/>
                <ellipse cx="43" cy="25" rx="7.5" ry="11" fill="url(#pawN)"/>
                <ellipse cx="59" cy="25" rx="7.5" ry="11" fill="url(#pawN)"/>
                <ellipse cx="74" cy="40" rx="7" ry="10" fill="url(#pawN)" transform="rotate(15 74 40)"/>
                <path d="M51 45C42 45 31 52 31 66C31 80 41 83 51 83C61 83 71 80 71 66C71 52 60 45 51 45Z" fill="url(#pawN)"/>
            </svg>
            chaiti
        </div>
    </div>
</nav>

<div class="gallery">
    <div class="gallery-header">
        <h1>منتجاتنا المميزة</h1>
    </div>
    <div class="grid" id="galleryGrid"></div>
</div>
    
    

<script src="order.js"></script>
<script src="panier.js" defer></script>
<script src="button.js"></script>
<script src="lightbox.js"></script>

<script>
    const products = [
        {
            id: 1,
            name: 'بيت كلاسيك',
            price: 2700,  // السعر بالدينار الجزائري
            images: [
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Cvd.png',
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Gasba.png',
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Jawhara.png',
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Khatmti.png',
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Khayma.png'
            ]
        },
        {
            id: 2,
            name: 'بيت البامبو',
            price: 8900,  // السعر بالدينار الجزائري
            images: [
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Jawhara.png',
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Khatmti.png',
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Kilo.png',
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Koba.png',
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Lito.png'
            ]
        },
        {
            id: 3,
            name: 'كهف الراحة',
            price: 2500,  // السعر بالدينار الجزائري
            images: [
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Koba.png',
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Pang.png',
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Rati.png',
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Snawbar.png',
                'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Terp.png'
            ]
        }
    ];
    
    const grid = document.getElementById('galleryGrid');
    
    products.forEach((product, productIndex) => {
        const card = document.createElement('div');
        card.className = 'card';
        
        // تنسيق السعر مع إضافة فاصلة الآلاف (ألفاص)
        const formattedPrice = product.price.toLocaleString('ar-DZ');
        
        // إنشاء هيكل البطاقة
        card.innerHTML = `
            <div class="main-image-container">
                <img src="${product.images[0]}" alt="${product.name}" class="main-img" loading="lazy">
            </div>
            <div class="thumbnails" id="thumbnails-${product.id}">
                ${product.images.map((img, idx) => `
                    <div class="thumbnail ${idx === 0 ? 'active' : ''}" data-img="${img}">
                        <img src="${img}" alt="صورة مصغرة ${idx + 1}" loading="lazy">
                    </div>
                `).join('')}
            </div>
            <div class="card-info">
                <h3>${product.name}</h3>
                <div class="product-price">
                    <span class="price-value">${formattedPrice}</span>
                    <span class="currency">دج</span>
                </div>
            </div>
        `;
        
        grid.appendChild(card);
        
        // الحصول على عناصر الصورة الرئيسية والمصغرات لهذه البطاقة
        const mainImg = card.querySelector('.main-img');
        const thumbnailsContainer = card.querySelector(`#thumbnails-${product.id}`);
        const thumbnailDivs = thumbnailsContainer.querySelectorAll('.thumbnail');
        
        // إضافة حدث النقر لكل صورة مصغرة
        thumbnailDivs.forEach(thumb => {
            thumb.addEventListener('click', function() {
                const newImageSrc = this.getAttribute('data-img');
                
                // تغيير الصورة الرئيسية
                mainImg.src = newImageSrc;
                
                // تحديث حالة التفعيل
                thumbnailDivs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
    });
</script>

</body>
</html>
