<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chaiti — بيوت القطط الفاخرة</title>

<!-- ⚡ تسريع الانتقال إلى المتجر -->
<link rel="prefetch" href="Boutique.html">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
/* ─── DESIGN TOKENS — Warm Cat Palette ─── */
:root {
  --bg-0:    #fdf8f2;
  --bg-1:    #faf3e8;
  --caramel:  #c97d3a;
  --honey:    #e9a84c;
  --sand:     #d4a96a;
  --terracotta: #c25e3a;
  --text-hi:  #2d1f0e;
  --text-md:  rgba(45,31,14,.62);
  --text-lo:  rgba(45,31,14,.38);
  --border:   rgba(180,130,80,.15);
  --border-hi:rgba(180,130,80,.3);
  --glass:    rgba(255,255,255,.55);
  --grad-brand: linear-gradient(135deg, #e9a84c 0%, #c97d3a 45%, #c25e3a 80%, #9e3a3a 100%);
  --grad-action: linear-gradient(135deg, #c25e3a 0%, #c97d3a 100%);
  --grad-warm:   linear-gradient(135deg, #c97d3a 0%, #e9a84c 100%);
  --r-md: 14px;
  --r-sm: 10px;
  --ease: cubic-bezier(.16,1,.3,1);
  --dur-fast: 180ms;
  --dur-med:  320ms;
  --dur-slow: 500ms;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Tajawal', sans-serif;
  background: var(--bg-0);
  color: var(--text-hi);
  overflow-x: hidden;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════ WELCOME SCREEN ONLY ═══════════════ */
#welcome {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-0);
  overflow: hidden;
}

/* رفع المحتوى إلى الأعلى بمقدار 5% من ارتفاع viewport */
.w-inner {
  position: relative;
  text-align: center;
  padding: 2rem 1.5rem;
  max-width: 540px;
  animation: wReveal .9s var(--ease) both;
  transform: translateY(-5vh);  /* رفع كل العناصر قليلاً للأعلى */
  max-width: 480px;
  width: 100%;
}


@keyframes wReveal {
  from { opacity:0; transform:translateY(calc(32px - 5vh)); }
  to   { opacity:1; transform:translateY(-5vh); }
}

/* Warm mesh background */
.w-mesh {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.w-mesh::before {
  content:'';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 55% at 10% 15%, rgba(233,168,76,.18) 0%, transparent 65%),
    radial-gradient(ellipse 55% 50% at 88% 80%, rgba(194,94,58,.14) 0%, transparent 65%),
    radial-gradient(ellipse 45% 40% at 50% 50%, rgba(212,169,106,.1) 0%, transparent 60%),
    radial-gradient(ellipse 35% 35% at 75% 12%, rgba(201,125,58,.12) 0%, transparent 55%);
  animation: meshShift 14s ease-in-out infinite alternate;
}
@keyframes meshShift {
  0%   { transform: scale(1) rotate(0deg); }
  100% { transform: scale(1.05) rotate(1.2deg); }
}

/* Subtle paw-print pattern */
.w-mesh::after {
  content:'';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle 1.5px at 20% 30%, rgba(201,125,58,.1) 100%, transparent),
    radial-gradient(circle 1.5px at 75% 65%, rgba(194,94,58,.08) 100%, transparent),
    radial-gradient(circle 1.5px at 45% 80%, rgba(201,125,58,.07) 100%, transparent);
  background-size: 80px 80px, 120px 120px, 90px 90px;
}

.w-noise {
  position: absolute;
  inset: 0;
  opacity: .025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px 180px;
}

/* Floating cat fur wisps */
.w-wisp {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  pointer-events: none;
}
.w-wisp:nth-child(1) { width: 300px; height: 200px; background: rgba(233,168,76,.12); top: -60px; right: -60px; animation: wispFloat 8s ease-in-out infinite; }
.w-wisp:nth-child(2) { width: 250px; height: 180px; background: rgba(194,94,58,.08); bottom: -40px; left: -40px; animation: wispFloat 11s ease-in-out infinite reverse; }
.w-wisp:nth-child(3) { width: 180px; height: 180px; background: rgba(212,169,106,.1); top: 40%; right: 10%; animation: wispFloat 9s ease-in-out infinite 2s; }
@keyframes wispFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  50%      { transform: translate(20px,-20px) scale(1.08); }
}

.w-paw {
  display: flex;
  justify-content: center;
  margin-bottom: 1.2rem;
  animation: pawBounce 3.5s ease-in-out infinite;
  filter: drop-shadow(0 6px 20px rgba(201,125,58,.35));
}
@keyframes pawBounce {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50%      { transform: translateY(-12px) rotate(4deg); }
}

.w-logo {
  font-family: 'Cairo', sans-serif;
  font-size: clamp(3.8rem,14vw,8rem);
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1;
  background: var(--grad-brand);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 4px 16px rgba(194,94,58,.2));
  animation: wReveal .9s var(--ease) .1s both;
}

.w-tag {
  font-size: clamp(.75rem,2vw,.9rem);
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--text-lo);
  margin: .75rem 0;
  animation: wReveal .9s var(--ease) .2s both;
}

.w-divider {
  width: 72px;
  height: 2px;
  margin: 1.1rem auto;
  background: linear-gradient(90deg, transparent, var(--honey), var(--caramel), transparent);
  animation: wReveal .9s var(--ease) .25s both;
}

.w-desc {
  color: var(--text-md);
  font-size: .98rem;
  line-height: 1.85;
  max-width: 400px;
  margin: 0 auto 2.2rem;
  animation: wReveal .9s var(--ease) .3s both;
}

.w-cta {
  position: relative;
  display: inline-block;
  background: var(--grad-action);
  color: #fff;
  border: none;
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: .5px;
  padding: .95rem 3.2rem;
  cursor: pointer;
  border-radius: var(--r-md);
  box-shadow: 0 6px 28px rgba(194,94,58,.32);
  transition: transform var(--dur-med) var(--ease), box-shadow var(--dur-med) ease;
  overflow: hidden;
  animation: wReveal .9s var(--ease) .4s both;
}
.w-cta::after {
  content:'';
  position: absolute;
  inset: 0;
  background: var(--grad-warm);
  opacity: 0;
  transition: opacity var(--dur-med) ease;
}
.w-cta:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 36px rgba(201,125,58,.4);
}
.w-cta:hover::after {
  opacity: 1;
}
.w-cta span {
  position: relative;
  z-index: 1;
}

/* تنسيق مناسب للشاشات الصغيرة حيث يظل كل شيء مقروءًا وواضحًا */
@media (max-width: 550px) {
  .w-inner { 
    padding: 1rem; 
    transform: translateY(-3vh);  /* رفع أقل قليلاً في الشاشات الصغيرة لتجنب الزحام */
  }
  @keyframes wReveal {
    from { opacity:0; transform:translateY(calc(20px - 3vh)); }
    to   { opacity:1; transform:translateY(-3vh); }
  }
  .toast { white-space: normal; text-align: center; font-size: .8rem; padding: .6rem 1.2rem; }
}

@media (min-width: 551px) and (max-width: 799px) {
  .w-inner {
    transform: translateY(-4vh);
  }
  @keyframes wReveal {
    from { opacity:0; transform:translateY(calc(28px - 4vh)); }
    to   { opacity:1; transform:translateY(-4vh); }
  }
}

/* Simple toast message */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(28px);
  background: #fff;
  color: var(--text-hi);
  font-family: 'Cairo', sans-serif;
  font-size: .88rem;
  font-weight: 600;
  padding: .75rem 1.8rem;
  z-index: 500;
  opacity: 0;
  pointer-events: none;
  border: 1px solid var(--border-hi);
  border-radius: 50px;
  box-shadow: 0 8px 28px rgba(180,100,40,.15);
  transition: all var(--dur-med) var(--ease);
  white-space: nowrap;
}
.toast.on {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.w-cta {
  padding: .95rem 3.2rem;
  font-size: 1.05rem;
  border-radius: 14px;
}

/* بصمة انتقال ذكية: حماية من النقر المتكرر */
.btn-loading {
  pointer-events: none;
  opacity: 0.7;
  transform: scale(0.98);
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ═══════════════ WELCOME SCREEN ONLY ═══════════════ -->
<div id="welcome">
  <div class="w-mesh"></div>
  <div class="w-wisp"></div>
  <div class="w-wisp"></div>
  <div class="w-wisp"></div>
  <div class="w-noise"></div>
  
  <div class="w-inner">
    <div class="w-paw">
      <svg width="108" height="108" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="pawW" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e9a84c"/>
            <stop offset="50%" stop-color="#c97d3a"/>
            <stop offset="100%" stop-color="#c25e3a"/>
          </linearGradient>
        </defs>
        <ellipse cx="28" cy="40" rx="7" ry="10" fill="url(#pawW)" transform="rotate(-15 28 40)"/>
        <ellipse cx="43" cy="25" rx="7.5" ry="11" fill="url(#pawW)"/>
        <ellipse cx="59" cy="25" rx="7.5" ry="11" fill="url(#pawW)"/>
        <ellipse cx="74" cy="40" rx="7" ry="10" fill="url(#pawW)" transform="rotate(15 74 40)"/>
        <path d="M51 45C42 45 31 52 31 66C31 80 41 83 51 83C61 83 71 80 71 66C71 52 60 45 51 45Z" fill="url(#pawW)"/>
      </svg>
    </div>
    
    <div class="w-logo">chaiti</div>
    
    <div class="w-divider"></div>
    
    <p class="w-desc">
راحة وأناقة لقطتك
    </p>
    
    <!-- ⚡ الزر المعدل للانتقال السريع مع دعم Smart History State Manager -->
    <button class="w-cta" id="shopEntryBtn">
      <span>دلل قطتك الآن 🐾</span>
    </button>
    
    <!-- (تم حذف العناصر الأربعة (badges) بالكامل حسب الطلب) -->
    
  </div>
</div>

<script>
// ============================================================
//  SMART HISTORY STATE MANAGER (v1.0)
//  مدير الحالة الذكي للملاحة وإدارة سجل التصفح وتجربة المستخدم
//  الميزات: 
//  - إدارة ذكية لاستبدال الحالات أو دفعها حسب السياق 
//  - منع ازدواجية الإدخالات في history
//  - حماية من التنقل الخاطئ عند العودة بالزر الخلفي
//  - استعادة الحالة الترويجية وجلسة المستخدم
//  - توافق مع SPA/MPA مع الاحتفاظ بالمرجعيات
// ============================================================
(function() {
  'use strict';

  // ----- تكوينات المدير -----
  const CONFIG = {
    // اسم الحالة الأساسية للشاشة الترحيبية (لتمييزها في السجل)
    WELCOME_STATE_KEY: 'chaiti:welcome',
    // هل نستبدل التاريخ الحالي بدلاً من إضافة إدخال جديد في أول تحميل؟ (لجعل الصفحة الرئيسية "جذرية")
    replaceInitialEntry: true,
    // هل نمنع الدخول المزدوج لنفس الحالة (يمنع تكرار نفس الصفحة في الـ history)
    preventDuplicateState: true,
    // مهلة حماية النقر المتكرر على الزر (ms)
    navigationCooldown: 500,
    // مسار المتجر (يمكن تغييره لاحقاً)
    boutiquePath: 'Boutique.html',
    // تمكين تصحيح الأخطاء في وحدة التحكم (لمطوري الموقع)
    debugMode: true
  };

  // متغيرات داخلية
  let isNavigating = false;          // منع النقر المتكرر
  let currentStateId = null;        // تتبع معرف الحالة الحالي لمنع الازدواجية
  let hasReplacedInitial = false;    // تم استبدال المدخل الأولي؟
  let popStateListenerAttached = false;
  let currentWelcomeActive = true;   // هل شاشة الترحيب نشطة الآن؟

  // مرجع لعنصر الزر وحاوية التوست
  const shopBtn = document.getElementById('shopEntryBtn');
  const toastEl = document.getElementById('toast');

  // دالة عرض الإشعارات الداخلية (تستعمل نفس واجهة Toast)
  function showSmartToast(message, duration = 2800) {
    if (!toastEl) return;
    toastEl.textContent = message;
    toastEl.classList.add('on');
    setTimeout(() => {
      toastEl.classList.remove('on');
    }, duration);
  }

  // تسجيل (log) في وضع التصحيح
  function debugLog(...args) {
    if (CONFIG.debugMode) {
      console.log('[SmartHistory]', ...args);
    }
  }

  // الحصول على الحالة الحالية من window.history (إذا كانت موجودة)
  function getCurrentHistoryState() {
    return window.history.state || null;
  }

  // توليد معرف فريد للحالة (بسيط وفعال)
  function generateStateId() {
    return `${CONFIG.WELCOME_STATE_KEY}_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
  }

  // بناء كائن الحالة الذكية 
  function createStateObject(customData = {}) {
    return {
      type: CONFIG.WELCOME_STATE_KEY,
      timestamp: Date.now(),
      id: generateStateId(),
      welcomeActive: true,      // في هذه الصفحة دائماً true (ما لم نغادر)
      from: 'welcome_screen',
      ...customData
    };
  }

  // فحص ما إذا كان التاريخ الحالي مكرراً (نفس نوع welcome ونفس النشاط)
  function isDuplicateOfCurrent(newState) {
    if (!CONFIG.preventDuplicateState) return false;
    const current = getCurrentHistoryState();
    if (!current) return false;
    // اذا كان كلا الحالتين من نوع الترحيب ونفس welcomeActive
    return (current.type === CONFIG.WELCOME_STATE_KEY && 
            newState.type === CONFIG.WELCOME_STATE_KEY &&
            current.welcomeActive === newState.welcomeActive);
  }

  // إدارة استبدال الحالة الحالية (لجعل نقطة الدخول نظيفة)
  function replaceWelcomeState() {
    if (hasReplacedInitial) return;
    try {
      const newState = createStateObject({ initialLoad: true, replaced: true });
      if (window.history.replaceState) {
        window.history.replaceState(newState, document.title, window.location.href);
        currentStateId = newState.id;
        hasReplacedInitial = true;
        debugLog('تم استبدال الحالة الأولية بنجاح (replaceState)', newState);
      } else {
        debugLog('المتصفح لا يدعم replaceState، نستخدم pushState احتياطياً');
        window.history.pushState(createStateObject({ initialLoad: true }), document.title, window.location.href);
        hasReplacedInitial = true;
      }
    } catch (e) {
      debugLog('خطأ أثناء استبدال الحالة:', e);
    }
  }

  // تهيئة أولية للمدير: استبدال أو دفع الحالة الافتراضية حسب التكوين
  function initHistoryManager() {
    // إذا كان الاستبدال مفعلاً والمدخل الحالي ليس حالتنا المخصصة 
    const currentState = getCurrentHistoryState();
    const isAlreadyManaged = currentState && currentState.type === CONFIG.WELCOME_STATE_KEY;
    
    if (CONFIG.replaceInitialEntry && !isAlreadyManaged) {
      replaceWelcomeState();
    } else if (!isAlreadyManaged) {
      // دفع حالة جديدة كمدخل آمن
      try {
        const freshState = createStateObject({ initialPush: true });
        window.history.pushState(freshState, document.title, window.location.href);
        currentStateId = freshState.id;
        hasReplacedInitial = true;
        debugLog('تم دفع حالة ترحيبية جديدة (pushState)');
      } catch(e) { debugLog(e); }
    } else {
      // بالفعل هناك حالة مُدارة
      currentStateId = currentState.id;
      hasReplacedInitial = true;
      debugLog('الحالة المدارة موجودة مسبقاً، نستخدمها');
    }
    
    // ربط مستمع popState للتعامل مع أزرار التنقل (الرجوع/التقدم)
    if (!popStateListenerAttached) {
      window.addEventListener('popstate', onPopState);
      popStateListenerAttached = true;
      debugLog('تم ربط مستمع popState');
    }
  }

  // المعالج الذكي لحدث الرجوع/التقدم من المستخدم
  function onPopState(event) {
    const state = event.state;
    debugLog('حدث popState تم استدعاؤه', state);
    
    // في حال عدم وجود حالة أو حالة غير متوقعة، نسمح بالسلوك الافتراضي لكن مع حماية minimal
    if (!state || state.type !== CONFIG.WELCOME_STATE_KEY) {
      // إذا كانت الصفحة الحالية هي شاشة الترحيب ولا توجد حالة مناسبة 
      // نستعيد حالة آمنة لمنع فقدان التحكم
      if (document.getElementById('welcome')) {
        debugLog('حالة غير معروفة، نستعيد الحالة الافتراضية للترحيب.');
        try {
          const safeState = createStateObject({ recovery: true });
          window.history.replaceState(safeState, document.title, window.location.href);
          currentStateId = safeState.id;
        } catch(e) {}
      }
      return;
    }
    
    // تحديث currentStateId
    if (state.id) currentStateId = state.id;
    currentWelcomeActive = state.welcomeActive === true;
    
    // في هذه الصفحة (شاشة الترحيب) welcomeActive تكون true دائماً.
    // لا نحتاج إلى إجراء إعادة تحميل للصفحة لأننا ما زلنا في شاشة الترحيب.
    // لكن قد يكون المستخدم عاد من المتجر باستخدام back، في هذه الحالة نظهر شاشة الترحيب طبيعيًا (موجودة بالفعل).
    // نتحقق إذا كانت شاشة الترحيب مرئية، وإن لم تكن (سيناريو نادر) نعيد إظهارها عبر تحديث visibility؟
    const welcomeDiv = document.getElementById('welcome');
    if (welcomeDiv && welcomeDiv.style.display === 'none') {
      // تأمين نادر: اذا تم إخفاؤها عن طريق الخطأ نعيد إظهارها
      welcomeDiv.style.display = 'flex';
      debugLog('تمت استعادة ظهور شاشة الترحيب بعد popState');
    }
    
    // إلغاء أي حالة "تحميل" للزر إن وجدت
    if (shopBtn) {
      shopBtn.classList.remove('btn-loading');
    }
    isNavigating = false;
    
    // إشعار للمستخدم (اختياري) لإعلامه بالعودة.
    showSmartToast('✨ عدت إلى شاشة chaiti', 1800);
  }

  // دالة الانتقال الذكي إلى المتجر (تحافظ على تاريخ نظيف وتمنع الازدواجية)
  function smartNavigateToBoutique() {
    // منع النقر المتكرر أثناء التنقل
    if (isNavigating) {
      debugLog('تنقل قيد التقدم، تجاهل النقرة.');
      showSmartToast('جاري التوجيه، انتظر لحظة', 1200);
      return;
    }
    
    // التحقق من أننا بالفعل في شاشة الترحيب (لم نغادر بعد)
    const welcomeDiv = document.getElementById('welcome');
    if (!welcomeDiv) {
      debugLog('عنصر الترحيب غير موجود، ربما تم الخروج');
      window.location.replace(CONFIG.boutiquePath);
      return;
    }
    
    // قبل الانتقال، نحتاج إلى دفع حالة تمثل مغادرة شاشة الترحيب؟ لا نحتاج بالضبط، لكن 
    // نود أن يحافظ المستخدم عند الرجوع على تجربة سليمة.
    // استراتيجية ذكية: عند الذهاب إلى المتجر، نستخدم replaceState للحالة الحالية لجعل 
    // الضغط على back يعود إلى نقطة دخول نظيفة (لا يوجد إدخال مزدوج)، ثم ننتقل.
    // لكن لضمان أن back سيعيد المستخدم إلى هذه الشاشة بالشكل الصحيح بدون تكرار، نستبدل الحالة الحالية
    // بحالة ترحيب نهائية ثم نوجه. هذا يحسن تجربة history.
    try {
      isNavigating = true;
      if (shopBtn) shopBtn.classList.add('btn-loading');
      
      // إنشاء حالة ختامية للترحيب (غير ضرورية لكنها تحافظ على السياق) ثم نقوم باستبدالها قبل المغادرة
      const finalWelcomeState = createStateObject({ willLeave: true, timestamp: Date.now() });
      window.history.replaceState(finalWelcomeState, document.title, window.location.href);
      debugLog('تم تحديث الحالة قبل المغادرة إلى المتجر');
      
      // إضافة إشارة صغيرة للمستخدم بأنه جاري التوجيه
      showSmartToast('🐾 جاري نقلك إلى متجر chaiti...', 1000);
      
      // تأخير بسيط جداً لضمان تحديث الواجهة وإعطاء انطباع سلس (اختياري)
      setTimeout(() => {
        // استخدام replace للملاحة بشكل آمن (لا يتراكم سجل زائد)
        // هذا يتيح زر الرجوع يعيد المستخدم إلى شاشة الترحيب مباشرة دون تكرار.
        window.location.replace(CONFIG.boutiquePath);
      }, 40);
    } catch (err) {
      debugLog('خطأ أثناء التنقل الذكي:', err);
      // فشل آمن: الانتقال المباشر
      window.location.href = CONFIG.boutiquePath;
    } finally {
      // لن نعيد تعيين isNavigating فوراً بسبب التأخير ولكن نتأكد من تحريره لو حدث خطأ
      setTimeout(() => {
        isNavigating = false;
        if (shopBtn) shopBtn.classList.remove('btn-loading');
      }, 300);
    }
  }

  // ربط الحدث بالزر مع دعم للمسؤولية الكاملة
  function bindSmartNavigation() {
    if (!shopBtn) {
      debugLog('زر الدخول غير موجود في DOM');
      return;
    }
    // إزالة المستمع القديم لتجنب التكرار
    const newBtn = shopBtn.cloneNode(true);
    shopBtn.parentNode?.replaceChild(newBtn, shopBtn);
    const finalBtn = document.getElementById('shopEntryBtn');
    if (finalBtn) {
      finalBtn.addEventListener('click', (e) => {
        e.preventDefault();
        smartNavigateToBoutique();
      });
      debugLog('تم ربط حدث النقر الذكي بالزر');
    } else {
      // Fallback
      const fallbackBtn = document.querySelector('.w-cta');
      if (fallbackBtn) {
        fallbackBtn.addEventListener('click', (e) => {
          e.preventDefault();
          smartNavigateToBoutique();
        });
      }
    }
  }

  // استعادة الحالة عند تحميل الصفحة بالكامل (إذا تم إعادة تحميل الصفحة من back/forward)
  function restoreOnLoad() {
    const currentState = getCurrentHistoryState();
    if (currentState && currentState.type === CONFIG.WELCOME_STATE_KEY) {
      debugLog('استعادة الحالة عند التحميل', currentState);
      currentStateId = currentState.id;
      currentWelcomeActive = true;
    } else if (!currentState) {
      // إذا لم توجد حالة بعد التحميل (نادر) نقوم بتهيئة آمنة
      replaceWelcomeState();
    }
    // التأكد من أن شاشة الترحيب مرئية
    const welcomeDiv = document.getElementById('welcome');
    if (welcomeDiv) welcomeDiv.style.display = 'flex';
  }

  // =========== تنفيذ إدارة الحالة الذكية ==========
  function bootstrap() {
    initHistoryManager();
    bindSmartNavigation();
    restoreOnLoad();
    // يمكن إضافة ميزة إضافية : مراقبة أحداث beforeunload لحفظ الحالة النهائية (اختياري)
    window.addEventListener('beforeunload', () => {
      debugLog('المستخدم يغادر الصفحة، الحالة محفوظة في history.');
    });
    debugLog('✅ Smart History State Manager يعمل بنجاح');
  }
  
  // بدء المدير بعد تحميل DOM بالكامل
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootstrap);
  } else {
    bootstrap();
  }
})();

// دالة showToast محفوظة للاستخدام العام (اختياري)
function showToast(message) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.textContent = message;
  toast.classList.add('on');
  setTimeout(() => {
    toast.classList.remove('on');
  }, 3000);
}
</script>
