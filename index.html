<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر احترافي - سلة الأسعار</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        :root {
            --accent-color: #2563eb; 
            --text-dark: #1e293b;
            --gray-border: #e2e8f0;
            --white: #ffffff;
            --price-bg: #eff6ff;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            margin: 0; padding: 0; 
            background: var(--white); 
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .product-card { 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .main-image-container { 
            width: 100%; 
            height: 58vh;
            background-color: #f1f5f9; 
            cursor: zoom-in;
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden;
        }
        .main-image-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .thumbnail-list { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin: 8px 0 6px 0; 
            padding: 0 10px; 
        }
        .thumb-item { 
            width: 80px; 
            height: 60px; 
            border-radius: 14px; 
            overflow: hidden; 
            cursor: pointer; 
            border: 2px solid transparent; 
            transition: 0.1s;
            background: #f8fafc;
        }
        .thumb-item.active { border-color: var(--accent-color); transform: scale(0.96);}
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px 0px 20px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .product-title { 
            font-size: 20px; 
            font-weight: 800; 
            margin: 0; 
            line-height: 1.3;
            color: #0f172a;
            flex: 2;
        }
        
        .price-basket {
            background: var(--price-bg);
            border-radius: 44px;
            padding: 5px 14px 5px 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.04);
            border: 1px solid rgba(37,99,235,0.25);
            direction: rtl;
            flex-shrink: 0;
        }
        .basket-icon {
            font-size: 22px;
            background: white;
            width: 38px;
            height: 38px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .dynamic-price-area {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .price-label {
            font-size: 10px;
            color: #4b5563;
            letter-spacing: 0.2px;
            font-weight: 600;
        }
        .price-now-dynamic {
            font-size: 20px;
            font-weight: 800;
            color: var(--accent-color);
            line-height: 1.2;
        }

        .options-section { 
            padding: 4px 20px 0 20px; 
            margin-bottom: 8px; 
        }
        select#productCount {
            width: 100%; 
            height: 48px; 
            padding: 0 16px; 
            border-radius: 16px; 
            border: 2px solid var(--gray-border);
            font-family: 'Cairo'; 
            font-size: 16px; 
            font-weight: 600;
            background: #f9fafb;
            appearance: none;
            cursor: pointer;
            color: #1e293b;
        }

        .btn-buy { 
            width: calc(100% - 40px); 
            margin: 8px auto 10px auto; 
            background-color: var(--accent-color); 
            color: white; 
            padding: 15px; 
            border-radius: 50px; 
            border: none; 
            font-family: 'Cairo'; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer;
            transition: 0.12s;
            box-shadow: 0 6px 12px rgba(37,99,235,0.2);
        }
        .btn-buy:active { transform: scale(0.97); }

        .trust-badges {
            display: flex;
            justify-content: space-around;
            margin: 6px 20px 10px 20px;
            padding: 12px 12px;
            background: #f9fafb;
            border-radius: 22px;
            gap: 8px;
        }
        .badge-item {
            text-align: center;
            font-size: 12px;
            color: #2c3e50;
            font-weight: 600;
            line-height: 1.4;
        }

        .lightbox {
            display: none; position: fixed; z-index: 4000; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.96);
            justify-content: center; align-items: center;
        }
        .lightbox-content-wrapper { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .lightbox img { max-width: 95%; max-height: 85%; object-fit: contain; border-radius: 16px; }
        .close-lb { position: absolute; top: 20px; right: 25px; color: white; font-size: 44px; cursor: pointer; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); color: white; border: none; padding: 12px 16px; cursor: pointer; font-size: 28px; border-radius: 60px; }
        .prev-btn { right: 15px; } .next-btn { left: 15px; }

        .order-modal {
            display: none; position: fixed; z-index: 3000; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.75);
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; width: 90%; max-width: 420px; padding: 24px 20px;
            border-radius: 32px; box-sizing: border-box;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 25px 40px rgba(0,0,0,0.25);
        }
        .order-modal input, .order-modal select {
            width: 100%; padding: 12px 20px; margin-bottom: 15px; border-radius: 18px; border: 1.5px solid #e2e8f0; font-family: 'Cairo'; box-sizing: border-box;
            font-size: 15px;
        }
        .btn-submit { 
            width: 100%; 
            background: #10b981; 
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 17px; 
            cursor: pointer; 
            margin-top: 8px; 
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-modal-icon { font-size: 32px; cursor: pointer; color: #64748b; }
        h3 { margin:0; font-weight: 800; font-size: 1.4rem; }

        .custom-thankyou-modal {
            display: none;
            position: fixed;
            z-index: 5000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
        }
        .thankyou-card {
            background: #ffffff;
            width: 85%;
            max-width: 400px;
            border-radius: 48px;
            padding: 32px 24px 40px;
            text-align: center;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
            direction: rtl;
            font-family: 'Cairo', sans-serif;
        }
        .thankyou-card .emoji-big {
            font-size: 64px;
            display: block;
            margin-bottom: 12px;
        }
        .thankyou-card h2 {
            font-size: 28px;
            font-weight: 800;
            color: #0f2b3d;
            margin: 10px 0 12px;
        }
        .thankyou-message {
            font-size: 18px;
            color: #2c3e50;
            line-height: 1.55;
            margin: 18px 0 20px;
            font-weight: 500;
            background: #f8fafc;
            padding: 16px;
            border-radius: 28px;
        }
        .thankyou-card .btn-close-thanks {
            background-color: var(--accent-color);
            border: none;
            color: white;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            width: 80%;
            margin-top: 12px;
            font-family: 'Cairo';
        }
        .error-message {
            background-color: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
            text-align: center;
            font-size: 13px;
            display: none;
        }
        .loading-spinner {
            display: none;
            text-align: center;
            margin: 10px 0;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="product-card">
    <div class="main-image-container" onclick="openLightbox()">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1000" id="currentMainImg" alt="منتج مميز">
    </div>

    <div class="thumbnail-list">
        <div class="thumb-item active" onclick="changeImage(0, 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1000')"><img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=150" alt="thumb1"></div>
        <div class="thumb-item" onclick="changeImage(1, 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=1000')"><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=150" alt="thumb2"></div>
        <div class="thumb-item" onclick="changeImage(2, 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=1000')"><img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=150" alt="thumb3"></div>
        <div class="thumb-item" onclick="changeImage(3, 'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=1000')"><img src="https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=150" alt="thumb4"></div>
    </div>

    <div class="product-header">
        <h2 class="product-title">⌚ ساعة رياضية ذكية - إصدار فاخر</h2>
        <div class="price-basket" id="priceBasket">
            <div class="basket-icon">🛒</div>
            <div class="dynamic-price-area">
                <span class="price-label">المجموع</span>
                <span class="price-now-dynamic" id="dynamicPriceDisplay">4500 DA</span>
            </div>
        </div>
    </div>

    <div class="trust-badges">
        <div class="badge-item">🚚 شحن مجاني<br>لكامل التراب</div>
        <div class="badge-item">🤝 دفع عند الاستلام<br>آمن 100%</div>
        <div class="badge-item">⭐ ضمان الجودة<br>والإستبدال</div>
    </div>

    <div class="options-section">
        <select id="productCount">
            <option value="" disabled>📦 اختر العبوة المناسبة لك</option>
            <option value="6" data-price="4500">🔥 سيرية 6 قطع - 4500 DA</option>
            <option value="8" data-price="6300">🚀 سيرية 8 قطع - 6300 DA</option>
            <option value="12" data-price="7500">💎 سيرية 12 قطعة - 7500 DA (الأفضل)</option>
        </select>
    </div>

    <button class="btn-buy" onclick="openOrderModal()">🛍️ أطلب الآن - الدفع عند الإستلام</button>
</div>

<div id="myLightbox" class="lightbox">
    <span class="close-lb" onclick="closeLightbox()">&times;</span>
    <div class="lightbox-content-wrapper">
        <button class="nav-btn prev-btn" onclick="moveSlide(1)">&#10095;</button>
        <img id="lightboxImg" alt="تكبير">
        <button class="nav-btn next-btn" onclick="moveSlide(-1)">&#10094;</button>
    </div>
</div>

<div id="orderModal" class="order-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📋 تفاصيل الطلب</h3>
            <span onclick="closeOrderModal()" class="close-modal-icon">&times;</span>
        </div>
        <form id="purchaseForm">
            <input type="text" id="fullName" placeholder="الاسم الكامل (ثلاثي)" required>
            <input type="tel" id="phone" placeholder="رقم الجوال 📱 مثال: 0556789123" required>
            <select id="stateSelect" required>
                <option value="" disabled selected>🏢 إختر الولاية - Wilaya</option>
            </select>
            <select id="municipalitySelect" disabled required>
                <option value="" disabled selected>🏘️ إختر البلدية - Commune</option>
            </select>
            <input type="text" id="address" placeholder="العنوان الكامل (الشارع، رقم البيت، الحي)" required>
            <div id="formError" class="error-message"></div>
            <div class="loading-spinner" id="loadingSpinner">
                <div class="spinner"></div>
                <p style="margin-top: 8px;">جاري إرسال الطلب...</p>
            </div>
            <button type="submit" class="btn-submit" id="submitOrderBtn">✔️ تأكيد الطلب وإرسال</button>
        </form>
        <p style="font-size: 12px; color: #5b6e8c; text-align: center; margin-top: 14px;">سيتواصل معكم فريقنا لتأكيد الطلب خلال 24 ساعة</p>
    </div>
</div>

<div id="customThankyouModal" class="custom-thankyou-modal">
    <div class="thankyou-card">
        <span class="emoji-big">🎉✅</span>
        <h2>شكراً لك!</h2>
        <div class="thankyou-message">
            🎉 تم استلام طلبك بنجاح! 🎉
        </div>
        <button class="btn-close-thanks" onclick="closeThankYouModal()">إغلاق</button>
    </div>
</div>

<script>
    // ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️
    // ضع رابط تطبيق Google Apps Script الخاص بك هنا
    const WEB_APP_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';
    // ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️ ⚠️
    
    // البيانات
    const images = [
        'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1200',
        'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=1200',
        'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=1200',
        'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=1200'
    ];
    let currentIndex = 0;
    
    // النظام مع السلة
    const countSelect = document.getElementById('productCount');
    const dynamicPriceSpan = document.getElementById('dynamicPriceDisplay');
    
    function updatePriceFromSelection() {
        const selectedOption = countSelect.options[countSelect.selectedIndex];
        if (!selectedOption || !selectedOption.value) {
            dynamicPriceSpan.innerHTML = `--- DA`;
            return;
        }
        const priceValue = selectedOption.getAttribute('data-price');
        if (priceValue) {
            dynamicPriceSpan.innerHTML = `${parseInt(priceValue).toLocaleString()} DA`;
        }
    }
    
    function setDefaultSelect() {
        for(let i = 0; i < countSelect.options.length; i++) {
            if(countSelect.options[i].value !== "") {
                countSelect.selectedIndex = i;
                updatePriceFromSelection();
                break;
            }
        }
    }
    countSelect.addEventListener('change', updatePriceFromSelection);
    setDefaultSelect();
    
    // معرض الصور
    function changeImage(index, url) {
        currentIndex = index;
        document.getElementById('currentMainImg').src = url;
        const thumbs = document.querySelectorAll('.thumb-item');
        thumbs.forEach((t, i) => t.classList.toggle('active', i === index));
    }
    
    function openLightbox() {
        document.getElementById("myLightbox").style.display = "flex";
        updateLightbox();
    }
    function closeLightbox() { document.getElementById("myLightbox").style.display = "none"; }
    function moveSlide(dir) {
        currentIndex += dir;
        if (currentIndex >= images.length) currentIndex = 0;
        if (currentIndex < 0) currentIndex = images.length - 1;
        updateLightbox();
        document.getElementById('currentMainImg').src = images[currentIndex];
        const thumbs = document.querySelectorAll('.thumb-item');
        thumbs.forEach((t, i) => t.classList.toggle('active', i === currentIndex));
    }
    function updateLightbox() { document.getElementById("lightboxImg").src = images[currentIndex]; }
    
    // بيانات الولايات
    const states = [
        { id: "16", ar: "الجزائر", fr: "Alger" },
        { id: "23", ar: "عنابة", fr: "Annaba" },
        { id: "31", ar: "وهران", fr: "Oran" },
        { id: "01", ar: "أدرار", fr: "Adrar" },
        { id: "17", ar: "البليدة", fr: "Blida" }
    ];
    const munisData = {
        "16": ["سيدي محمد", "بئر مراد رايس", "الحراش", "باب الزوار", "القبة", "بن عكنون"],
        "23": ["عنابة", "الحجار", "برحال", "سرايدي", "سيدي عمار", "الزيتونة"],
        "31": ["وهران", "بئر الجير", "السانية", "قديل", "بوتليليس", "مرسى الكبير"],
        "01": ["أدرار", "تامنطيت", "رقان", "تيميمون", "أولف"],
        "17": ["البليدة", "بوفاريك", "العفرون", "موزاية", "الشبلي"]
    };
    
    const stateSelect = document.getElementById("stateSelect");
    states.forEach(s => {
        let opt = document.createElement("option");
        opt.value = s.id;
        opt.textContent = `${s.id} - ${s.ar} - ${s.fr}`;
        stateSelect.appendChild(opt);
    });
    
    window.updateMunicipalities = function() {
        const mSelect = document.getElementById("municipalitySelect");
        const selectedId = stateSelect.value;
        mSelect.innerHTML = '<option value="" disabled selected>🏡 إختر البلدية - Commune</option>';
        if (selectedId && munisData[selectedId]) {
            mSelect.disabled = false;
            munisData[selectedId].forEach(m => {
                let opt = document.createElement("option");
                opt.value = m;
                opt.textContent = m;
                mSelect.appendChild(opt);
            });
        } else {
            mSelect.disabled = true;
        }
    };
    
    stateSelect.addEventListener('change', updateMunicipalities);
    
    function openOrderModal() {
        const selectedVal = countSelect.value;
        if(!selectedVal || selectedVal === "") {
            alert("⚠️ يرجى تحديد الكمية أولاً (اختر 6، 8 أو 12 قطعة)");
            return;
        }
        document.getElementById("orderModal").style.display = "flex";
    }
    
    function closeOrderModal() { 
        document.getElementById("orderModal").style.display = "none"; 
        document.getElementById("formError").style.display = "none";
    }
    
    function showCustomThankyou() {
        document.getElementById("customThankyouModal").style.display = "flex";
    }
    
    function closeThankYouModal() {
        document.getElementById("customThankyouModal").style.display = "none";
        enableSubmitButton();
    }
    
    let submitBtn = document.getElementById('submitOrderBtn');
    let loadingSpinner = document.getElementById('loadingSpinner');
    
    function disableSubmitButton() {
        if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.6';
            loadingSpinner.style.display = 'block';
        }
    }
    
    function enableSubmitButton() {
        if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
            loadingSpinner.style.display = 'none';
        }
    }
    
    function showError(message) {
        const errorDiv = document.getElementById("formError");
        errorDiv.textContent = message;
        errorDiv.style.display = "block";
        setTimeout(() => {
            errorDiv.style.display = "none";
        }, 5000);
    }
    
    window.onclick = (e) => {
        if (e.target.id === "myLightbox") closeLightbox();
        if (e.target.id === "orderModal") closeOrderModal();
        if (e.target.id === "customThankyouModal") closeThankYouModal();
    };
    
    // إرسال الطلب
    document.getElementById('purchaseForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const productTitle = "⌚ ساعة رياضية ذكية - إصدار فاخر";
        const quantityElem = countSelect.options[countSelect.selectedIndex];
        const quantity = quantityElem ? quantityElem.value : "غير محدد";
        const totalPrice = dynamicPriceSpan.innerText;
        
        const fullName = document.getElementById('fullName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const wilaya = stateSelect.options[stateSelect.selectedIndex]?.text || "غير محدد";
        const baladia = document.getElementById("municipalitySelect")?.value || "غير محدد";
        const address = document.getElementById('address').value.trim();
        
        if(!fullName || fullName.length < 3){
            showError("⚠️ يرجى إدخال الاسم الكامل بشكل صحيح");
            return;
        }
        if(!phone || phone.length < 9){
            showError("⚠️ يرجى إدخال رقم جوال صحيح");
            return;
        }
        if(!stateSelect.value){
            showError("⚠️ الرجاء اختيار الولاية");
            return;
        }
        if(!document.getElementById("municipalitySelect").value){
            showError("⚠️ الرجاء اختيار البلدية");
            return;
        }
        if(!address || address.length < 5){
            showError("⚠️ يرجى إدخال العنوان الكامل");
            return;
        }
        
        disableSubmitButton();
        
        const orderData = {
            productTitle: productTitle,
            quantity: quantity,
            totalPrice: totalPrice,
            fullName: fullName,
            phone: phone,
            wilaya: wilaya,
            baladia: baladia,
            address: address,
            notes: ""
        };
        
        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(orderData)
            });
            
            console.log('تم إرسال الطلب بنجاح');
            closeOrderModal();
            showCustomThankyou();
            
        } catch(error) {
            console.error('خطأ:', error);
            showError("❌ حدث خطأ في الاتصال: " + error.message);
            enableSubmitButton();
        }
    };
    
    window.changeImage = changeImage;
    window.openLightbox = openLightbox;
