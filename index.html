<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري - طلب شراء</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .iframe-wrapper {
            width: 100%;
            max-width: 550px;
            margin: 20px auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 20px;
            overflow: hidden;
            background: white;
        }
        iframe {
            width: 100%;
            height: 650px;
            border: none;
            display: block;
        }
        @media (max-width: 600px) {
            .iframe-wrapper {
                margin: 0;
                border-radius: 0;
                box-shadow: none;
            }
            iframe {
                height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="iframe-wrapper">

    </div>
</body>
</html>
