<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chaiti — بيوت القطط الفاخرة | المتجر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root {
  --bg-0:    #fdf8f2;
  --bg-1:    #faf3e8;
  --bg-2:    #f5ead8;
  --bg-3:    #eeddc4;
  --caramel:  #c97d3a;
  --honey:    #e9a84c;
  --sand:     #d4a96a;
  --terracotta: #c25e3a;
  --blush:    #e88a6a;
  --clay:     #9e5a3a;
  --sage:     #7a9e7e;
  --dusty-rose: #c8836a;
  --grad-brand: linear-gradient(135deg, #e9a84c 0%, #c97d3a 45%, #c25e3a 80%, #9e3a3a 100%);
  --grad-action: linear-gradient(135deg, #c25e3a 0%, #c97d3a 100%);
  --grad-warm:   linear-gradient(135deg, #c97d3a 0%, #e9a84c 100%);
  --grad-soft:   linear-gradient(135deg, #e9a84c 0%, #d4a96a 100%);
  --text-hi:  #2d1f0e;
  --text-md:  rgba(45,31,14,.62);
  --text-lo:  rgba(45,31,14,.38);
  --border:   rgba(180,130,80,.15);
  --border-hi:rgba(180,130,80,.3);
  --glass:    rgba(255,255,255,.55);
  --glass-hi: rgba(255,255,255,.8);
  --shadow-warm: 0 8px 32px rgba(180,100,40,.1);
  --shadow-card: 0 4px 20px rgba(140,80,30,.08);
  --r-xl: 28px;
  --r-lg: 20px;
  --r-md: 14px;
  --r-sm: 10px;
  --ease: cubic-bezier(.16,1,.3,1);
  --ease-out: cubic-bezier(.22,1,.36,1);
  --dur-fast: 180ms;
  --dur-med:  320ms;
  --dur-slow: 500ms;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; scroll-behavior:smooth; }
body {
  font-family:'Tajawal', sans-serif;
  background: var(--bg-0);
  color: var(--text-hi);
  overflow-x: hidden;
  height: 100%;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-1); }
::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 2px; }

#shop {
  background: var(--bg-0);
  min-height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
}

.s-nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(253,248,242,.92);
  backdrop-filter: blur(24px) saturate(1.6);
  border-bottom: 1px solid var(--border-hi);
  padding: .7rem 1rem;
  box-shadow: 0 2px 16px rgba(180,100,40,.06);
}
.nav-wrap {
  max-width: 1300px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
}

.menu-btn {
  width: 42px; height: 42px;
  background: var(--glass); border: 1px solid var(--border-hi);
  border-radius: var(--r-sm); cursor: pointer; color: var(--text-hi);
  font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background var(--dur-fast) ease, border-color var(--dur-fast) ease;
}
.menu-btn:hover { background: rgba(201,125,58,.12); border-color: var(--caramel); }

.s-brand {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: .55rem;
  font-family: 'Cairo', sans-serif; font-size: 1.75rem; font-weight: 900;
  background: var(--grad-brand);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; white-space: nowrap;
}
.s-brand svg { -webkit-text-fill-color: initial; flex-shrink: 0; }

.cart-btn {
  background: var(--grad-action);
  color: #fff; border: none;
  font-family: 'Cairo', sans-serif; font-weight: 600; font-size: .88rem;
  padding: .5rem 1.15rem;
  border-radius: var(--r-sm); cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; gap: .5rem;
  box-shadow: 0 3px 14px rgba(194,94,58,.25);
  transition: transform var(--dur-fast) var(--ease), box-shadow var(--dur-fast) ease;
  text-decoration: none;
}
.cart-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(194,94,58,.38); }
.cart-badge {
  background: #fff; color: var(--terracotta);
  font-size: .72rem; font-weight: 900;
  padding: .1rem .4rem; border-radius: 6px; min-width: 20px; text-align: center;
}

@media(max-width:640px) {
  .s-brand { font-size: 1.15rem; gap: .35rem; }
  .s-brand svg { width: 26px; height: 26px; }
  .menu-btn { width: 38px; height: 38px; }
  .cart-btn { padding: .42rem .9rem; font-size: .78rem; }
}

.s-hero {
  padding: 3.5rem 2rem 2.5rem;
  text-align: center;
}
.s-hero h1 {
  font-family: 'Cairo', sans-serif;
  font-size: clamp(1.8rem,4vw,2.6rem);
  font-weight: 900; color: var(--text-hi);
  margin-bottom: .45rem;
}
.s-body { max-width: 1300px; margin: 0 auto; padding: 1.25rem 1.5rem 5rem; }

.p-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(295px,1fr));
  gap: 1.75rem;
}

.p-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  overflow: hidden;
  transition:
    transform var(--dur-med) var(--ease),
    box-shadow var(--dur-med) ease,
    border-color var(--dur-med) ease;
  box-shadow: var(--shadow-card);
}
.p-card:hover {
  transform: translateY(-7px);
  box-shadow: 0 22px 48px rgba(180,100,40,.14), 0 0 0 1px rgba(201,125,58,.22);
  border-color: rgba(201,125,58,.3);
}

.p-gallery { position:relative; background: var(--bg-1); overflow: hidden; }
.p-main {
  width:100%; aspect-ratio:1/1; object-fit:cover; display:block;
  transition: transform var(--dur-slow) var(--ease);
  cursor: pointer;
}
.p-card:hover .p-main { transform: scale(1.04); }

.p-overlay {
  position:absolute; inset:0;
  background: rgba(0,0,0,0);
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: all var(--dur-med) ease;
  pointer-events: none;
}
.p-card:hover .p-overlay { background: rgba(45,25,5,.12); opacity:1; }
.p-overlay-icon {
  background: rgba(255,255,255,.75);
  border: 1.5px solid rgba(201,125,58,.4);
  backdrop-filter: blur(8px);
  border-radius: 50%;
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.35rem;
  transform: scale(.7); transition: transform var(--dur-med) var(--ease);
}
.p-card:hover .p-overlay-icon { transform: scale(1); }

.p-thumbs {
  display:flex; gap:.5rem; padding:.65rem;
  background: var(--bg-1);
  border-top: 1px solid var(--border);
  overflow-x:auto; scrollbar-width:none;
}
.p-thumbs::-webkit-scrollbar { display:none; }
.p-thumb {
  width:52px; height:52px; flex-shrink:0;
  border: 2px solid transparent;
  border-radius: var(--r-sm); overflow:hidden;
  cursor:pointer; background: var(--bg-0);
  transition: border-color var(--dur-fast) ease, transform var(--dur-fast) ease;
}
.p-thumb img { width:100%; height:100%; object-fit:cover; }
.p-thumb:hover { transform: scale(1.05); }
.p-thumb.on { border-color: var(--caramel); }

.p-body {
  padding: 1.2rem 1.2rem 1.3rem;
  background: #fff;
}
.p-name {
  font-family: 'Cairo', sans-serif;
  font-size: 1.05rem; font-weight: 700;
  color: var(--text-hi); margin-bottom: .85rem;
  line-height: 1.4;
}
.p-foot { display:flex; align-items:center; justify-content:space-between; gap:.5rem; }
.p-price {
  font-family: 'Cairo', sans-serif;
  font-size: 1.22rem; font-weight: 700;
  background: var(--grad-warm);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.p-add {
  background: var(--bg-1); border: 1.5px solid var(--border-hi);
  color: var(--text-hi);
  font-family: 'Cairo', sans-serif; font-size: .84rem; font-weight: 600;
  padding: .58rem 1.2rem; border-radius: var(--r-md); cursor:pointer;
  transition: all var(--dur-fast) var(--ease);
}
.p-add:hover {
  background: var(--grad-action); border-color: transparent;
  color: #fff;
  box-shadow: 0 4px 16px rgba(194,94,58,.28);
  transform: scale(1.04);
}

@media(max-width:768px) {
  .s-body { padding: 1rem 1rem 4rem; }
  .p-grid { grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap:1.2rem; }
}

.lightbox-overlay {
    position: fixed; inset: 0;
    background: rgba(45,25,5,0.92);
    backdrop-filter: blur(10px);
    z-index: 2000;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    cursor: pointer;
}
.lightbox-overlay.active { display: flex; }
.lightbox-image-container {
    width: 100%; height: 85%;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    touch-action: pan-y pinch-zoom;
}
.lightbox-image {
    max-width: 90%; max-height: 90%;
    object-fit: contain;
    border-radius: 16px;
    box-shadow: 0 30px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(201,125,58,.25);
    pointer-events: none;
}
.lightbox-counter {
    position: absolute;
    top: 22px; left: 0; right: 0;
    text-align: center;
    color: #faf3e8;
    background: rgba(45,25,5,0.55);
    width: fit-content;
    margin: 0 auto;
    padding: 6px 18px;
    border-radius: 40px;
    font-size: 0.85rem;
    font-weight: 700;
    backdrop-filter: blur(4px);
    z-index: 2005;
    pointer-events: none;
    border: 1px solid rgba(201,125,58,.25);
}
.close-lightbox {
    position: absolute;
    top: 20px; left: 20px;
    background: rgba(45,25,5,0.5);
    border: 1px solid rgba(201,125,58,.35);
    color: #faf3e8;
    font-size: 1.4rem;
    width: 44px; height: 44px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 2005;
    backdrop-filter: blur(6px);
    transition: 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}
.close-lightbox:hover { background: var(--caramel); color: #fff; border-color: var(--caramel); }

.overlay {
  position:fixed; inset:0; z-index:110;
  background: rgba(45,25,5,.35);
  backdrop-filter: blur(4px);
  opacity:0; pointer-events:none;
  transition: opacity var(--dur-med) ease;
}
.overlay.on { opacity:1; pointer-events:all; }

.menu-drawer {
  position:fixed; top:0; right:0;
  width: min(320px,85vw);
  height:100vh;
  background: #fff;
  border-left: 1px solid var(--border-hi);
  z-index:150; display:flex; flex-direction:column;
  transform: translateX(110%);
  transition: transform var(--dur-slow) var(--ease);
  box-shadow: -8px 0 40px rgba(180,100,40,.1);
}
.menu-drawer.open { transform: translateX(0); }

.md-header {
  padding: 1.4rem 1.3rem;
  border-bottom: 1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
  background: var(--bg-1);
}
.md-header h4 { font-family:'Cairo',sans-serif; font-size:1.2rem; font-weight:800; color: var(--text-hi); letter-spacing:-0.3px; background: var(--grad-warm); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }

.md-items {
  flex:1; padding: 1.5rem 0.8rem;
  display: flex; flex-direction: column;
  gap: 0.25rem;
}

.menu-link {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.9rem 1.2rem;
  margin: 0.2rem 0;
  font-family: 'Cairo', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-hi);
  background: #ffffff;
  border-radius: var(--r-md);
  transition: all 0.2s var(--ease);
  cursor: pointer;
  border: 1px solid transparent;
  width: 100%;
  text-align: right;
}
.menu-link i {
  width: 26px;
  font-size: 1.2rem;
  color: var(--caramel);
  transition: transform 0.2s ease;
}
.menu-link span { flex: 1; }
.menu-link:hover {
  background: var(--bg-1);
  border-color: var(--border-hi);
  transform: translateX(-4px);
}
.menu-link:hover i {
  transform: scale(1.05);
  color: var(--terracotta);
}
.md-items hr {
  margin: 0.5rem 0.8rem;
  border: none;
  height: 1px;
  background: linear-gradient(to left, var(--border), transparent);
}

.md-footer {
  padding:1.2rem;
  border-top:1px solid var(--border);
  font-size:.75rem;
  color:var(--text-lo);
  text-align:center;
  background: var(--bg-1);
  font-weight:500;
}

.toast { position:fixed; bottom:2rem; left:50%; transform: translateX(-50%) translateY(28px); background:#fff; color:var(--text-hi); font-family:'Cairo',sans-serif; font-size:.88rem; font-weight:600; padding:.75rem 1.8rem; z-index:500; opacity:0; pointer-events:none; border:1px solid var(--border-hi); border-radius:50px; box-shadow: 0 8px 28px rgba(180,100,40,.15); transition: all var(--dur-med) var(--ease); }
.toast.on { opacity:1; transform: translateX(-50%) translateY(0); }

.modal-info {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.96);
  background: #fff;
  border-radius: var(--r-xl);
  max-width: 340px;
  width: 85%;
  padding: 1.8rem 1.5rem;
  text-align: center;
  box-shadow: 0 32px 60px rgba(45,25,5,0.25);
  border: 1px solid var(--border-hi);
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s var(--ease);
  font-family: 'Tajawal', sans-serif;
}
.modal-info.show {
  opacity: 1;
  pointer-events: auto;
  transform: translate(-50%, -50%) scale(1);
}
.modal-info h3 {
  font-family: 'Cairo', sans-serif;
  font-size: 1.3rem;
  margin-bottom: 0.8rem;
  color: var(--terracotta);
}
.modal-info p {
  color: var(--text-md);
  font-size: 0.9rem;
  line-height: 1.5;
  margin-bottom: 0;
  white-space: pre-line;
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div id="shop">
  <nav class="s-nav">
    <div class="nav-wrap">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="s-brand">
        <svg width="34" height="34" viewBox="0 0 100 100">
          <defs><linearGradient id="pawN" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e9a84c"/><stop offset="100%" stop-color="#c25e3a"/></linearGradient></defs>
          <ellipse cx="28" cy="40" rx="7" ry="10" fill="url(#pawN)" transform="rotate(-15 28 40)"/>
          <ellipse cx="43" cy="25" rx="7.5" ry="11" fill="url(#pawN)"/>
          <ellipse cx="59" cy="25" rx="7.5" ry="11" fill="url(#pawN)"/>
          <ellipse cx="74" cy="40" rx="7" ry="10" fill="url(#pawN)" transform="rotate(15 74 40)"/>
          <path d="M51 45C42 45 31 52 31 66C31 80 41 83 51 83C61 83 71 80 71 66C71 52 60 45 51 45Z" fill="url(#pawN)"/>
        </svg>
        chaiti
      </div>
      <a href="Panier.html" class="cart-btn">🛒 السلة <span class="cart-badge" id="cnt">0</span></a>
    </div>
  </nav>
  <div class="s-hero">
    <h1>منتجاتنا المميزة</h1>
  </div>
  <div class="s-body">
    <div class="p-grid" id="pgrid"></div>
  </div>
</div>

<div class="overlay" id="menuOverlay"></div>
<div class="menu-drawer" id="menuDrawer">
  <div class="md-header">
    <h4>✨ القائمة</h4>
  </div>
  <div class="md-items">
    <button class="menu-link" data-action="delivery">
      <i class="fas fa-truck-fast"></i>
      <span>التوصيل</span>
      <i class="fas fa-chevron-left" style="font-size: 0.7rem; opacity:0.6;"></i>
    </button>
    <button class="menu-link" data-action="faq">
      <i class="fas fa-question-circle"></i>
      <span>الأسئلة الشائعة</span>
      <i class="fas fa-chevron-left" style="font-size: 0.7rem; opacity:0.6;"></i>
    </button>
    <button class="menu-link" data-action="contact">
      <i class="fas fa-headset"></i>
      <span>تواصل معنا</span>
      <i class="fas fa-chevron-left" style="font-size: 0.7rem; opacity:0.6;"></i>
    </button>
    <button class="menu-link" data-action="about">
      <i class="fas fa-paw"></i>
      <span>من نحن</span>
      <i class="fas fa-chevron-left" style="font-size: 0.7rem; opacity:0.6;"></i>
    </button>
    <hr>
    <div style="margin-top:auto; background:transparent; border:none; padding:0.8rem;">شيتي ♡ راحة قطتك تسعدنا</div>
  </div>
  <div class="md-footer">chaiti — بكل الحب لصديقك الأليف 🐾</div>
</div>

<div id="lightboxOverlay" class="lightbox-overlay">
  <div class="lightbox-counter" id="lightboxCounter"></div>
  <button class="close-lightbox" id="closeLightboxBtn"><i class="fas fa-times"></i></button>
  <div class="lightbox-image-container" id="lightboxImageContainer">
    <img id="lightboxImg" class="lightbox-image" alt="معرض الصور">
  </div>
</div>

<div id="infoModal" class="modal-info">
  <h3 id="modalTitle"></h3>
  <p id="modalText"></p>
</div>

<script>
const PRODUCTS = [
  {id:1, name:'بيت كلاسيك ', price:3800,
   imgs:['https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Cvd.png',
         'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Gasba.png',
         'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Jawhara.png',
         'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Khatmti.png',
         'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Khayma.png']},
  {id:2, name:'بيت البامبو ', price:4500,
   imgs:['https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Jawhara.png',
         'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Khatmti.png',
         'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Kilo.png',
         'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Koba.png',
         'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Lito.png']},
  {id:3, name:'كهف الراحة ', price:3200,
   imgs:['https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Koba.png',
         'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Pang.png',
         'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Rati.png',
         'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Snawbar.png',
         'https://raw.githubusercontent.com/polina5566hpl-beep/Chop-form/ed35b93c1cafca60e729205e141835006318062b/Cats/Terp.png']}
];

let cart = [];
let activeLightboxImages = [];
let currentLightboxIndex = 0;
let touchStartX = 0, touchEndX = 0;
let currentModalType = null; // لتذكر نوع المودال المفتوح

function loadCartFromStorage() {
  const savedCart = localStorage.getItem('chaiti_cart');
  if (savedCart) {
    try { cart = JSON.parse(savedCart); updateUI(); }
    catch(e) { console.error('خطأ في تحميل السلة', e); }
  }
}

function saveCartToStorage() {
  localStorage.setItem('chaiti_cart', JSON.stringify(cart));
}

function renderProducts() {
  const g = document.getElementById('pgrid');
  g.innerHTML = PRODUCTS.map(p => `
    <div class="p-card">
      <div class="p-gallery">
        <img class="p-main" id="mi${p.id}" src="${p.imgs[0]}" alt="${p.name}" loading="lazy" onclick="openLightbox(${p.id}, 0)">
        <div class="p-overlay">
          <div class="p-overlay-icon">🔍</div>
        </div>
        <div class="p-thumbs">
          ${p.imgs.map((s,i) => `<div class="p-thumb${i===0?' on':''}" onclick="swImg(${p.id},${i},this,event)"><img src="${s}" loading="lazy"></div>`).join('')}
        </div>
      </div>
      <div class="p-body">
        <div class="p-name">${p.name}</div>
        <div class="p-foot">
          <div class="p-price">${p.price.toLocaleString()} دج</div>
          <button class="p-add" onclick="addCart(${p.id})">أضف للسلة</button>
        </div>
      </div>
    </div>
  `).join('');
}

function swImg(pid, idx, el, e) {
  if(e) e.stopPropagation();
  const p = PRODUCTS.find(x=>x.id===pid);
  document.getElementById('mi'+pid).src = p.imgs[idx];
  el.parentElement.querySelectorAll('.p-thumb').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
}

function openLightbox(pid, idx) {
  const p = PRODUCTS.find(x=>x.id===pid);
  if(!p || !p.imgs) return;
  activeLightboxImages = [...p.imgs];
  currentLightboxIndex = Math.min(idx, p.imgs.length-1);
  const lo = document.getElementById("lightboxOverlay");
  const li = document.getElementById("lightboxImg");
  const lc = document.getElementById("lightboxCounter");
  li.src = activeLightboxImages[currentLightboxIndex];
  lc.innerText = `${currentLightboxIndex+1} / ${activeLightboxImages.length}`;
  lo.classList.add("active");
  document.body.style.overflow = "hidden";
  
  // إضافة حالة اللايت بوكس إلى التاريخ
  history.pushState({ lightbox: true, productId: pid, imageIndex: currentLightboxIndex }, '');
}

function closeLightboxOnly() {
  const lo = document.getElementById("lightboxOverlay");
  const menu = document.getElementById("menuDrawer");
  const modal = document.getElementById("infoModal");
  if(lo.classList.contains("active")) {
    lo.classList.remove("active");
    document.body.style.overflow = "";
    activeLightboxImages = [];
    
    // بعد إغلاق اللايت بوكس، نحدد الحالة المناسبة
    if(modal.classList.contains('show')) {
      // إذا كان المودال مفتوح، نضيف حالته للتاريخ
      history.replaceState({ modalOpen: true, modalType: currentModalType }, '');
    } else if(menu.classList.contains('open')) {
      // إذا كانت القائمة مفتوحة، نضيف حالتها للتاريخ
      history.replaceState({ menuOpen: true }, '');
    } else {
      history.replaceState({ main: true }, '');
    }
  }
}
function closeLightbox() { closeLightboxOnly(); }

function nextImage(d=1) {
  if(!activeLightboxImages.length) return;
  currentLightboxIndex = (currentLightboxIndex + d + activeLightboxImages.length) % activeLightboxImages.length;
  document.getElementById("lightboxImg").src = activeLightboxImages[currentLightboxIndex];
  document.getElementById("lightboxCounter").innerText = `${currentLightboxIndex+1} / ${activeLightboxImages.length}`;
}

function setupTouchEvents() {
  const c = document.getElementById("lightboxImageContainer");
  if(!c) return;
  c.addEventListener("touchstart", e => { touchStartX = e.changedTouches[0].screenX; }, {passive:false});
  c.addEventListener("touchend", e => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchEndX - touchStartX;
    if(Math.abs(diff) > 50) {
      if(diff>0) nextImage(-1);
      else nextImage(1);
      e.preventDefault();
    }
  });
}

function addCart(id) {
  const p = PRODUCTS.find(x=>x.id===id);
  const ex = cart.find(x=>x.id===id);
  if(ex) ex.qty++;
  else cart.push({...p, qty:1});
  updateUI();
  saveCartToStorage();
  toast(`✓ تم إضافة "${p.name}" للسلة`);
}

function updateUI() {
  const count = cart.reduce((s,x)=>s+x.qty,0);
  const cntSpan = document.getElementById('cnt');
  if(cntSpan) cntSpan.textContent = count;
}

function openMenu() {
  const drawer = document.getElementById('menuDrawer');
  if(drawer.classList.contains('open')) return;
  drawer.classList.add('open');
  document.getElementById('menuOverlay').classList.add('on');
  history.pushState({ menuOpen: true }, '');
}

function closeMenu() {
  const drawer = document.getElementById('menuDrawer');
  if(!drawer.classList.contains('open')) return;
  drawer.classList.remove('open');
  document.getElementById('menuOverlay').classList.remove('on');
  
  // تحديث الحالة بعد إغلاق القائمة
  const modal = document.getElementById('infoModal');
  if(!modal.classList.contains('show')) {
    history.replaceState({ main: true }, '');
  } else {
    history.replaceState({ modalOpen: true, modalType: currentModalType }, '');
  }
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),3000);
}

function showInfoModal(type) {
  const modal = document.getElementById('infoModal');
  const titleEl = document.getElementById('modalTitle');
  const textEl = document.getElementById('modalText');
  let title = '', content = '';
  switch(type) {
    case 'delivery':
      title = '🚚 التوصيل';
      content = 'نوصل لكل الولايات الجزائر خلال 3-5 أيام عمل. شحن مجاني للطلبيات التي تتجاوز 7000 دج. فريقنا يهتم بتغليف آمن ومراعاة سلامة المنتجات.';
      break;
    case 'faq':
      title = '❓ الأسئلة الشائعة';
      content = '• كم تستغرق مدة التوصيل؟ \nمن 3 إلى 5 أيام.\n• هل المنتجات قابلة للاستبدال؟ نعم خلال 7 أيام.\n• المواد المستخدمة؟ خامات طبيعية وصديقة للقطط.\n• طرق الدفع: عند الاستلام أو بطاقة ذهبية.';
      break;
    case 'contact':
      title = '📞 تواصل معنا';
      content = 'البريد الإلكتروني: support@chaiti.dz\nالهاتف: +213 55 123 4567\nساعات العمل: من السبت إلى الخميس 10 صباحاً – 7 مساءً.\nنحن هنا لمساعدتك بكل حب.';
      break;
    case 'about':
      title = '🐾 من نحن';
      content = 'شيتي Chaiti علامة جزائرية متخصصة في تصميم بيوت القطط الفاخرة. نصنع بحرفية يدوية ونستخدم أجود أنواع الراتان والقماش لتوفير ملاذ مثالي لأليفك. كل قطعة تحمل بصمة الحب.';
      break;
    default: return;
  }
  currentModalType = type;
  titleEl.innerText = title;
  textEl.innerText = content;
  modal.classList.add('show');
  history.pushState({ modalOpen: true, modalType: type }, '');
}

function closeModal() {
  const modal = document.getElementById('infoModal');
  const menu = document.getElementById('menuDrawer');
  modal.classList.remove('show');
  
  // 🔑 المفتاح: بعد إغلاق المودال، نتحقق من حالة القائمة
  if(menu.classList.contains('open')) {
    // إذا كانت القائمة مفتوحة، نستبدل الحالة بحالة القائمة
    history.replaceState({ menuOpen: true }, '');
  } else {
    // إذا كانت القائمة مغلقة، نعود للحالة الرئيسية
    history.replaceState({ main: true }, '');
  }
  currentModalType = null;
}

// ===== نظام الـ PopState المتكامل =====
window.addEventListener('popstate', function(e) {
  const state = e.state;
  const lo = document.getElementById("lightboxOverlay");
  const modal = document.getElementById('infoModal');
  const menu = document.getElementById("menuDrawer");
  
  // 1) معرض الصور مفتوح - نغلقه
  if (lo.classList.contains("active")) {
    closeLightboxOnly();
    return;
  }
  
  // 2) المودال مفتوح - نغلقه (القائمة ستبقى مفتوحة إن كانت موجودة)
  if (modal.classList.contains('show')) {
    closeModal();
    return;
  }
  
  // 3) القائمة مفتوحة - نغلقها
  if (menu.classList.contains("open")) {
    closeMenu();
    return;
  }
  
  // 4) الحالة الافتراضية - نضمن أن كل شيء مغلق
  if (state && state.main) {
    if(lo.classList.contains("active")) closeLightboxOnly();
    if(modal.classList.contains('show')) closeModal();
    if(menu.classList.contains("open")) closeMenu();
  }
});

// أحداث الأزرار والتحكم
document.getElementById('menuBtn').addEventListener('click', openMenu);
document.getElementById('closeLightboxBtn').addEventListener('click', closeLightbox);
document.getElementById('lightboxOverlay').addEventListener('click', e => {
  if(e.target === document.getElementById('lightboxOverlay')) closeLightbox();
});

document.getElementById('menuOverlay').addEventListener('click', closeMenu);

document.querySelectorAll('.menu-link[data-action]').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const action = btn.getAttribute('data-action');
    if(action) {
      // لا نغلق القائمة قبل فتح المودال
      showInfoModal(action);
    }
  });
});

document.getElementById('infoModal').addEventListener('click', function(e) {
    if(e.target === this) {
        closeModal();
    }
});

// معالجة أزرار لوحة المفاتيح
document.addEventListener('keydown', (e) => {
  const lo = document.getElementById("lightboxOverlay");
  if(lo.classList.contains("active")) {
    if(e.key === 'Escape') closeLightbox();
    if(e.key === 'ArrowLeft') nextImage(-1);
    if(e.key === 'ArrowRight') nextImage(1);
    e.preventDefault();
  }
  const modal = document.getElementById('infoModal');
  if(modal.classList.contains('show') && e.key === 'Escape') {
    closeModal();
  }
  const menu = document.getElementById('menuDrawer');
  if(menu.classList.contains('open') && e.key === 'Escape') {
    closeMenu();
  }
});

setupTouchEvents();
loadCartFromStorage();
renderProducts();
updateUI();
// تعيين الحالة الأولية
history.replaceState({ main: true }, '');
</script>
</body>
</html>
